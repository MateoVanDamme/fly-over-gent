<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Fly Over Gent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading">Loading city tiles...</div>

    <div id="controls-overlay" class="debug-info">
        <div id="tile-info" style="font-size: 20px; font-weight: bold; color: #ff3333; margin-bottom: 8px;">—</div>
        <div class="overlay-hint">Press <kbd>I</kbd> to hide</div>
        <h3>Minimap</h3>
        <div class="legend-grid">
            <span class="legend-swatch" style="background:#551100;"></span><span>Available</span>
            <span class="legend-swatch" style="background:#882200;"></span><span>SW cached</span>
            <span class="legend-swatch" style="background:#cc3300;"></span><span>In memory</span>
            <span class="legend-swatch" style="background:#ff8800;"></span><span>Loading</span>
            <span class="legend-swatch" style="background:#ffee55;"></span><span>Loaded</span>
            <span class="legend-swatch" style="background:#ffffff;"></span><span>Camera</span>
        </div>
        <h3 style="margin-top: 10px;">Controls</h3>
        <div class="controls-grid">
            <kbd>WASD</kbd><span>Move</span>
            <kbd>Space / Shift</kbd><span>Fly up / down</span>
            <kbd>Mouse</kbd><span>Look around</span>
            <kbd>I</kbd><span>Toggle UI</span>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
    }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
