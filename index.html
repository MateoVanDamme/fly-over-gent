<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Fly Over Gent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading">Loading city tiles...</div>

    <div id="controls-overlay" class="debug-info">
        <div id="tile-info" style="font-size: 20px; font-weight: bold; color: #ff3333; margin-bottom: 8px;">—</div>
        <div class="overlay-hint">Press <kbd>I</kbd> to hide</div>
        <h3>Minimap</h3>
        <div class="legend-grid">
            <span class="legend-swatch" style="background:#551100;"></span><span>Available</span>
            <span class="legend-swatch" style="background:#882200;"></span><span>SW cached</span>
            <span class="legend-swatch" style="background:#cc3300;"></span><span>In memory</span>
            <span class="legend-swatch" style="background:#ff8800;"></span><span>Loading</span>
            <span class="legend-swatch" style="background:#ffee55;"></span><span>Loaded</span>
            <span class="legend-swatch" style="background:#ffffff;"></span><span>Camera</span>
        </div>
        <h3 style="margin-top: 10px;">Controls</h3>
        <div class="controls-grid">
            <kbd>WASD</kbd><span>Move</span>
            <kbd>Space / Shift</kbd><span>Fly up / down</span>
            <kbd>Mouse</kbd><span>Look around</span>
            <kbd>I</kbd><span>Toggle UI</span>
            <kbd>E</kbd><span>Toggle edges</span>
        </div>
        <h3 style="margin-top: 10px;">Tools</h3>
        <a href="https://print-gent.mateovandamme.com/" style="color:#ffaa55; display:block;">→ crop a printable STL</a>
        <a href="https://mateovandamme.com/art/flyover-ghent" style="color:#ffaa55; display:block; margin-top:4px;">← back to mateovandamme.com</a>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
    }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            // Track whether this page started with a controlling SW. If so,
            // a controllerchange means a new SW just took over (e.g. after
            // the cache name bumped) — reload once so the page picks up the
            // fresh tiles instead of showing the old cached ones.
            const hadController = !!navigator.serviceWorker.controller;
            navigator.serviceWorker.register('sw.js');
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing || !hadController) return;
                refreshing = true;
                location.reload();
            });
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
